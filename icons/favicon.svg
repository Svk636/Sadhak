<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="18" fill="#FAFAF8"/>
  <!-- Outer amber ring -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="#B8832A" stroke-width="4" stroke-dasharray="239" stroke-dashoffset="60" stroke-linecap="round" transform="rotate(-90 50 50)"/>
  <!-- Inner ring -->
  <circle cx="50" cy="50" r="26" fill="none" stroke="#ECEAE5" stroke-width="3"/>
  <circle cx="50" cy="50" r="26" fill="none" stroke="#B8832A" stroke-width="3" stroke-dasharray="163" stroke-dashoffset="41" stroke-linecap="round" transform="rotate(-90 50 50)" opacity="0.6"/>
  <!-- Sanskrit character ◈ center dot -->
  <circle cx="50" cy="50" r="5" fill="#B8832A"/>
