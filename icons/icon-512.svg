<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#FAFAF8"/>
  <!-- Subtle texture border -->
  <rect x="10" y="10" width="492" height="492" rx="94" stroke="#B8832A" stroke-width="3" stroke-opacity="0.25"/>
  <!-- Top amber accent bar -->
  <rect x="48" y="72" width="416" height="3" rx="1.5" fill="#B8832A" fill-opacity="0.4"/>
  <!-- Sadhak Devanagari text - साधक -->
  <text x="256" y="280" font-family="'Noto Sans Devanagari', 'Devanagari', serif" font-size="140" font-weight="700" text-anchor="middle" fill="#111110" letter-spacing="-3">साधक</text>
  <!-- English subtitle -->
  <text x="256" y="340" font-family="'Courier New', monospace" font-size="36" font-weight="400" text-anchor="middle" fill="#888884" letter-spacing="12">SADHAK</text>
  <!-- Tagline -->
  <text x="256" y="390" font-family="'Courier New', monospace" font-size="18" font-weight="300" text-anchor="middle" fill="#B8832A" letter-spacing="4">YOUR HUMAN OS</text>
  <!-- Bottom amber accent bar -->
  <rect x="48" y="430" width="416" height="3" rx="1.5" fill="#B8832A" fill-opacity="0.4"/>
</svg>
